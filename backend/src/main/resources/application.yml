server:
  # 云平台通过 PORT 环境变量指定端口，本地默认 8080
  port: ${PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: zhixue-mofang-backend
  mvc:
    static-path-pattern: /**
  web:
    resources:
      static-locations: classpath:/static/
  datasource:
    # 优先使用环境变量配置的数据库（云平台），否则使用 H2 内存数据库（本地开发）
    url: ${DATABASE_URL:jdbc:h2:mem:zhixue_mofang;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:zhixue-mofang-secret-key-for-jwt-token-generation-must-be-long-enough-2024}
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "

# 日志配置
logging:
  level:
    com.zhixue: INFO
    org.springframework: WARN
