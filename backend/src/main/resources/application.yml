server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: zhixue-mofang-backend
  mvc:
    static-path-pattern: /**
  web:
    resources:
      static-locations: classpath:/static/
  datasource:
    url: jdbc:h2:mem:zhixue_mofang;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: zhixue-mofang-secret-key-for-jwt-token-generation-must-be-long-enough-2024
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "