[build]
  base = "frontend"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# SPA 路由支持 - 所有页面重写到 index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Path = ["!/assets/*", "!/api/*", "!/favicon.svg", "!/*.js", "!/*.css", "!/*.png", "!/*.jpg", "!/*.svg", "!/*.ico", "!/*.json", "!/*.woff", "!/*.woff2", "!/*.ttf"]}

# API 代理配置说明：
# 如果你的后端部署在 Render/Railway 等平台，有两种方式配置 API 访问：
#
# 方式1（推荐）：在 Netlify 后台设置环境变量
#   VITE_API_BASE_URL = https://your-backend.onrender.com/api
#   这样前端会直接请求后端地址，无需配置下面的代理
#
# 方式2：取消下面的注释，配置 Netlify 代理
#   [[redirects]]
#     from = "/api/*"
#     to = "https://your-backend.onrender.com/api/:splat"
#     status = 200
#     force = true

# 静态资源缓存策略
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 安全头设置
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
